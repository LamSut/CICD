name: Tag from Version

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch all tags
        run: git fetch --tags

      - name: Check tag already exists
        shell: bash
        run: |
          set -euo pipefail
          VERSION='${{ inputs.version }}'

          if git rev-parse --verify --quiet "refs/tags/$VERSION" >/dev/null; then
            echo "Tag $VERSION already exists"
            exit 1
          fi

      - name: Create Git Tag
        shell: bash
        run: |
          set -euo pipefail
          VERSION='${{ inputs.version }}'
          git tag "$VERSION"

      - name: Push Tag
        shell: bash
        run: |
          set -euo pipefail
          VERSION='${{ inputs.version }}'
          git push origin "refs/tags/$VERSION"