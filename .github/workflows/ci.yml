name: Build, Scan, Push and Tag

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

  pull_request_target:
    branches:
      - main
    types:
      - closed

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare Services with Version
    uses: ./.github/workflows/ci-prepare.yml
    with:
      services: ${{ vars.SERVICES }}
      event_name: ${{ github.event_name }}
      ref_name: ${{ github.ref_name }}
      pr_title: ${{ github.event.pull_request.title || '' }}

  scan-code-quality:
    name: Scan Code Quality
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/sonarcloud.yml
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build-docker-images:
    name: Build Docker Image
    needs:
      - prepare
      - scan-code-quality
    if: |
      (github.event_name == 'pull_request' && needs.scan-code-quality.result == 'success') ||
      (github.event_name == 'pull_request_target' && github.event.pull_request.merged == true)
    strategy:
      matrix:
        service: ${{ fromJSON(needs.prepare.outputs.services) }}
    uses: ./.github/workflows/docker-build.yml
    with:
      service: ${{ matrix.service }}
      version: ${{ needs.prepare.outputs.version }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

  scan-image-vulnerabilities:
    name: Scan Image Vulnerabilities
    if: github.event_name == 'pull_request'
    needs:
      - prepare
      - build-docker-images
    strategy:
      matrix:
        service: ${{ fromJSON(needs.prepare.outputs.services) }}
    uses: ./.github/workflows/trivy.yml
    with:
      service: ${{ matrix.service }}
      version: ${{ needs.prepare.outputs.version }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

  push-docker-images:
    name: Push Docker Images
    if: github.event_name == 'pull_request_target' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main' && needs.prepare.result == 'success'
    needs:
      - prepare
    strategy:
      matrix:
        service: ${{ fromJSON(needs.prepare.outputs.services) }}
    uses: ./.github/workflows/docker-push.yml
    with:
      service: ${{ matrix.service }}
      version: ${{ needs.prepare.outputs.version }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  tag-version:
    name: Tag Version
    if: github.event_name == 'pull_request_target' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main' && needs.prepare.result == 'success'
    needs:
      - prepare
      - push-docker-images
    uses: ./.github/workflows/tag-version.yml
    with:
      version: ${{ needs.prepare.outputs.version }}